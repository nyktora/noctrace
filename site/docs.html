      <h1>Noctrace Documentation</h1>
      <h2>Installation</h2>
      <p>Install globally (recommended): <code>npm install -g noctrace</code> — auto-registers with Claude Code for auto-start. Or try without installing: <code>npx noctrace</code></p>
      <h2>What is Noctrace?</h2>
      <p>Noctrace is a Chrome DevTools Network-tab-style waterfall visualizer for Claude Code agent workflows. It reads JSONL session logs from ~/.claude/projects/ and renders them as an interactive timeline.</p>
      <h2>Features</h2>
      <ul>
        <li>Waterfall timeline with tool calls, API requests, and agent spawns</li>
        <li>Context health scoring to detect context rot</li>
        <li>Token tracking across sessions</li>
        <li>Sub-agent visibility with collapsible groups</li>
        <li>Real-time WebSocket streaming</li>
        <li>Zoom, pan, and filtering</li>
        <li>Efficiency tips — 8 waste patterns with amber lightbulb indicator</li>
        <li>Security tips — 13 security patterns with red shield indicator</li>
      </ul>
      <p><a href="https://github.com/nyktora/noctrace">View on GitHub</a> | <a href="./">Back to home</a></p>
