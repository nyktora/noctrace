    <h1>Noctrace</h1>
    <p>Chrome DevTools Network-tab-style real-time waterfall visualizer for Claude Code agent workflows. Open source, local-only, zero config.</p>
    <h2>Features</h2>
    <ul>
      <li>Waterfall timeline — see every tool call, API request, and agent spawn on a shared time axis</li>
      <li>Context health scoring — detect context rot before it derails your session</li>
      <li>Token tracking — monitor cumulative token usage across the session</li>
      <li>Sub-agent visibility — collapsible agent groups with nested tool calls</li>
      <li>Real-time streaming — live updates via WebSocket as your session progresses</li>
      <li>Efficiency tips — 8 waste patterns flagged with an amber lightbulb indicator</li>
      <li>Security tips — 13 security patterns flagged with a red shield indicator</li>
      <li>MCP session registry — sessions register/unregister themselves; dashboard shows only active sessions with a live count indicator</li>
      <li>Per-tool token cost — estimated USD cost on every row and session total in the toolbar; Claude public pricing with per-model detection</li>
      <li>Agent type labels — subagent rows show the named agent type as a blue badge chip</li>
      <li>Tool failure rows — crashes, timeouts, and kills render as distinct red-tinted rows with a lightning bolt icon</li>
      <li>API error markers — rate limit, billing, and auth failures appear as full-width red alert banners on the timeline</li>
      <li>Agent Teams panel — detects running Agent Teams at ~/.claude/teams/, shows members and task counts in a flyout</li>
      <li>Context Startup flyout — shows which instruction files loaded at session start with estimated token counts</li>
    </ul>
    <h2>Install</h2>
    <p>Install globally: <code>npm install -g noctrace</code></p>
    <p>Then opt in to auto-start: <code>noctrace --enable</code></p>
    <p>Or try without installing: <code>npx noctrace</code></p>
    <p><a href="https://github.com/nyktora/noctrace">View on GitHub</a> | <a href="https://npmjs.com/package/noctrace">View on npm</a></p>
