    <h1>Noctrace — Claude Code Observability &amp; AI Agent DevTools</h1>
    <h2>AI Coding Agent Observability for Claude Code, Codex CLI, and GitHub Copilot</h2>

    <section>
      <p>Noctrace is a free, open-source, local-only observability dashboard for AI coding agent workflows — supporting Claude Code, OpenAI Codex CLI, and GitHub Copilot Chat. It reads session logs and renders them as an interactive waterfall timeline in your browser — with no cloud dependency, no telemetry, no database, and zero configuration required. Install it with a single command: <code>npx noctrace</code>.</p>
      <p>The interface is modeled after Chrome DevTools' Network tab. Every tool call — Read, Write, Edit, Bash, Agent, MCP — appears as a horizontal timing bar on a shared time axis. You can see exactly what your AI agent did, how long each step took, how many tokens it consumed, and what it cost in estimated USD. Sub-agents spawned by Claude Code appear as collapsible row groups, letting you drill into nested tool calls across the full agent delegation tree.</p>
    </section>

    <section>
      <h2>What is context rot and why does it matter?</h2>
      <p>Context rot is the progressive degradation of Claude Code session quality that happens as the context window fills. When context fill exceeds roughly 80%, Claude begins to lose access to early instructions, prior tool outputs, and reasoning chains. The practical result is repeated work, contradictory edits, and an increasing error rate — a session that starts strong but quietly goes off the rails.</p>
      <p>Noctrace makes context rot visible. Waterfall rows are tinted red when they executed above 80% context fill. A heat strip along the left edge of each row transitions from green to yellow to red as the window fills. Compaction boundary lines mark where Claude Code triggered automatic context compaction — each one is a lossy memory operation. A drift rate metric (tokens per minute, computed via three-window linear regression) shows how fast the context is growing before health scores catch up. Together, these signals let you see a session degrading in real time and decide when to compact or restart.</p>
    </section>

    <section>
      <h2>Key capabilities</h2>
      <ul>
        <li><strong>Waterfall timeline:</strong> every tool call and agent spawn on a shared time axis with zoom (1–50x) and click-drag pan. Identical in concept to Chrome DevTools Network tab.</li>
        <li><strong>Context health scoring:</strong> an A–F grade computed from five weighted signals — context fill (40%), compaction events (25%), file re-reads (15%), error rate acceleration (10%), and tool efficiency trends (10%). The animated ring badge fills in real time as the session progresses.</li>
        <li><strong>Sub-agent visibility:</strong> collapsible agent groups with nested tool call rows. Agent type labels show the named type (Explore, core:deep-researcher, senior-software-engineer, etc.) as a blue badge chip next to each agent row.</li>
        <li><strong>Token cost estimation:</strong> estimated USD cost appears on every waterfall row and as a session total in the toolbar. Pricing uses Claude's public rates with automatic per-model detection (Sonnet, Opus, Haiku).</li>
        <li><strong>Context rot detection:</strong> red row tinting above 80% fill, a heat strip along the left edge, compaction boundary markers, re-read indicators, and a drift rate metric that shows tokens-per-minute growth.</li>
        <li><strong>Efficiency tips:</strong> 8 waste patterns detected per session — re-reads, fan-out, correction loops, repeated commands, token spikes, high context fill, lack of delegation, and post-compaction re-reads. Flagged with an amber lightbulb indicator in the toolbar.</li>
        <li><strong>Security tips:</strong> 13 security patterns scanned, including secrets in tool calls, dangerous commands, exfiltration attempts, and prompt injection. Flagged with a red shield indicator.</li>
        <li><strong>Loop detection:</strong> three or more consecutive identical tool calls (same tool type and same input) automatically trigger a warning tip.</li>
        <li><strong>Advanced filtering:</strong> structured syntax alongside text search — <code>type:bash</code>, <code>&gt;5s</code>, <code>&lt;100ms</code>, <code>tokens:&gt;1k</code>, <code>error</code>, <code>running</code>. Structured filters are AND-ed; multiple <code>type:</code> filters are OR-ed.</li>
        <li><strong>Session comparison:</strong> split-screen view comparing two sessions side by side, with health grades, summary metric deltas, tool mix proportion bars, and context fill trajectory sparklines.</li>
        <li><strong>Real-time streaming:</strong> WebSocket byte-offset incremental parsing means only new bytes are read on each file change. Auto-reconnect handles server restarts.</li>
        <li><strong>Docker support:</strong> <code>npx noctrace --docker &lt;container&gt;</code> attaches to a running Docker container and streams its Claude Code session logs to your host. Zero container setup — any image with curl or wget works.</li>
        <li><strong>OTel export:</strong> sessions are exportable as OpenTelemetry traces for Grafana, Jaeger, or Datadog via <code>GET /api/session/:slug/:id/otlp</code>.</li>
        <li><strong>MCP session registry:</strong> sessions self-register on start and unregister on exit. The dashboard shows only active sessions with a live count indicator.</li>
        <li><strong>Per-tool latency stats:</strong> P50, P95, and Max latency breakdown per tool type in the Stats flyout. Calls exceeding the slow-call threshold (default 5000ms) are flagged with a clock icon on the row.</li>
        <li><strong>Context Startup flyout:</strong> shows which CLAUDE.md and instruction files loaded at session start with estimated token counts, so you can see what filled your context before the first tool call.</li>
        <li><strong>Hook lifecycle rows:</strong> PostToolUse, SubagentStart, and SubagentStop events from Claude Code hooks render as distinct teal timeline rows.</li>
        <li><strong>Resizable Name column:</strong> drag the column header edge to resize, stored in state across sessions.</li>
        <li><strong>GitHub Copilot Chat provider (new in v1.5):</strong> sessions from VS Code Copilot Chat appear automatically alongside Claude Code and Codex sessions. 20 internal tool IDs are mapped to familiar names (Read, Write, Edit, Bash, etc.). Copilot projects show a blue "copilot" badge in the session picker.</li>
        <li><strong>Multi-provider session picker (new in v1.4+):</strong> Claude Code, OpenAI Codex CLI, and GitHub Copilot Chat sessions all appear in one unified view with per-provider badges. Zero configuration — each provider auto-detects its session directory.</li>
        <li><strong>Per-turn token attribution (new in v1.6):</strong> stacked bar chart in the detail panel showing where tokens went each turn — thinking, tool I/O, system prompt, user text, cache reads.</li>
        <li><strong>Cache hit rate metric (new in v1.6):</strong> toolbar shows cache hit percentage pill (yellow when &gt;= 50%). Yellow dot on cached rows. Extracted from JSONL <code>cache_read_input_tokens</code>.</li>
        <li><strong>Cross-session full-text search (new in v1.6):</strong> Cmd+Shift+F or "Search all..." in the toolbar. Scans all sessions from all providers (last 30 days). Click results to navigate directly to the matching row.</li>
        <li><strong>Tool-specific detail renderers (new in v1.6):</strong> Edit/Write show inline diffs, Read shows syntax-highlighted code with line numbers, Bash shows terminal-styled output with error lines tinted red, Glob/Grep show file lists with icons.</li>
      </ul>

    <section>
      <h2>How to install Noctrace</h2>
      <p><strong>Option 1 — Try without installing (recommended for first use):</strong></p>
      <p><code>npx noctrace</code></p>
      <p>This downloads noctrace temporarily, starts a local server on port 4117, and opens the dashboard in your browser. Nothing is written to disk after you close it. Requires Node.js 20 LTS or later and at least one AI coding tool (Claude Code, Codex CLI, or Copilot Chat) with at least one session logged to disk.</p>
      <p><strong>Option 2 — Install globally:</strong></p>
      <p><code>npm install -g noctrace</code></p>
      <p>After installing, run <code>noctrace --enable</code> to register Noctrace as an MCP server in Claude Code. This causes the dashboard to open automatically every time a new Claude Code session starts. To stop auto-starting, run <code>noctrace --disable</code>.</p>
      <p><strong>Option 3 — Real-time hook events (optional):</strong></p>
      <p>By default Noctrace reads session logs passively with no hooks required. For real-time event streaming (SubagentStart/Stop, PostToolUse, compaction events pushed directly to the dashboard), run <code>noctrace --install-hooks</code>. Remove hooks with <code>noctrace --uninstall-hooks</code>.</p>
    </section>

    <section>
      <h2>How Noctrace works</h2>
      <p>Noctrace is a single Node.js process. It runs a local Express 5 server on port 4117 that serves a React SPA, exposes a REST API, and upgrades WebSocket connections. The file watcher (chokidar) monitors <code>~/.claude/projects/</code> for new or modified JSONL files. When a file changes, the server reads only the new bytes using byte-offset incremental parsing and pushes the parsed rows to the browser over WebSocket. No data ever leaves the machine.</p>
      <p>Session logs are JSONL files written by Claude Code at <code>~/.claude/projects/&lt;project-slug&gt;/&lt;session-id&gt;.jsonl</code>. Sub-agent logs live at <code>~/.claude/projects/&lt;project-slug&gt;/&lt;session-id&gt;/subagents/agent-&lt;agent-id&gt;.jsonl</code>. Noctrace parses both formats and links sub-agent rows to their parent agent rows. The server is stateless — all persistent state comes from the JSONL files on disk.</p>
      <p>The waterfall component is built with positioned <code>div</code> elements and virtual scrolling, rendering only visible rows for sessions with 200+ tool calls. The health scorer runs a weighted average of five signals on every WebSocket push. All colors use CSS custom properties from a single theme file (Catppuccin Mocha).</p>
    </section>

    <section>
      <h2>System requirements</h2>
      <ul>
        <li>Node.js 20 LTS or later</li>
        <li>macOS, Linux, or Windows (WSL recommended on Windows)</li>
        <li>Any modern browser (Chrome, Firefox, Safari, Edge)</li>
        <li>At least one of: Claude Code (sessions in <code>~/.claude/projects/</code>), Codex CLI (sessions in <code>~/.codex/sessions/</code>), or GitHub Copilot Chat (VS Code workspaceStorage)</li>
      </ul>
    </section>

    <section>
      <h2>Supported AI Coding Agent Providers</h2>
      <p>Noctrace auto-detects sessions from three AI coding tools. All appear in one unified session picker with per-provider badges. Zero configuration required for any provider.</p>
      <ul>
        <li><strong>Claude Code (Anthropic):</strong> reads JSONL session logs from <code>~/.claude/projects/</code>. Full Claude Code observability — context health scoring, token cost estimation, compaction tracking, sub-agent waterfall, tool call visualization, and OpenTelemetry export. This is the primary Claude Code session viewer and Claude Code log viewer.</li>
        <li><strong>Codex CLI (OpenAI):</strong> reads <code>~/.codex/sessions/YYYY/MM/DD/rollout-*.jsonl</code> files. Codex CLI observability with per-turn token accounting and full tool-call granularity. Orange <code>codex</code> badge in the session picker. Honors the <code>CODEX_HOME</code> environment variable.</li>
        <li><strong>GitHub Copilot Chat (new in v1.5):</strong> reads VS Code workspaceStorage session files from <code>~/Library/Application Support/Code/User/workspaceStorage/</code>. Copilot agent monitoring with 20 internal tool IDs mapped to familiar names (Read, Write, Edit, Bash, etc.). Blue <code>copilot</code> badge. Token counts are not available since Copilot Chat does not expose them.</li>
      </ul>
    </section>
