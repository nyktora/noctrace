name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths: [site/**]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
      # IndexNow key: 4d691bd276782520f8d95f96adb9508e
      - name: Notify IndexNow
        run: |
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d '{
              "host": "nyktora.github.io",
              "key": "4d691bd276782520f8d95f96adb9508e",
              "keyLocation": "https://nyktora.github.io/noctrace/4d691bd276782520f8d95f96adb9508e.txt",
              "urlList": [
                "https://nyktora.github.io/noctrace/",
                "https://nyktora.github.io/noctrace/docs.html"
              ]
            }'
